name: VectorialData
options:
  bundleIdPrefix: com.vectorialdata
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_MODULE_VERIFIER: YES

targets:
  VectorialData:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VectorialData
        excludes:
          - "Info.plist"
          - "VectorialData.entitlements"
    resources: []
    dependencies:
      - target: VectorialDataWidgets
    entitlements:
      path: VectorialData/VectorialData.entitlements
      properties:
        aps-environment: development
    info:
      path: VectorialData/Info.plist
      properties:
        CFBundleDisplayName: Vectorial Data
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: com.vectorialdata.app.auth
            CFBundleURLSchemes:
              - vectorialdata
        UILaunchScreen:
          UIColorName: AppBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Vectorial Data uses Face ID to securely unlock your account."
        NSSupportsLiveActivities: true
        CFBundleLocalizations:
          - en
          - es
          - pt
          - hi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vectorialdata.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO

  VectorialDataWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VectorialDataWidgets
        excludes:
          - "VectorialDataWidgets.entitlements"
      - path: VectorialData/Core/Models/PortfolioSnapshot.swift
      - path: VectorialData/Core/Models/PickActivityAttributes.swift
    resources:
      - path: VectorialData/Assets.xcassets
    entitlements:
      path: VectorialDataWidgets/VectorialDataWidgets.entitlements
      properties: {}
    info:
      path: VectorialDataWidgets/Info.plist
      properties:
        CFBundleDisplayName: Vectorial Data
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vectorialdata.app.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic

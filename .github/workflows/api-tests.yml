name: API Tests

on:
  push:
    branches: [main]
  schedule:
    # Daily at 8:00 AM CT (13:00 UTC)
    - cron: "0 13 * * *"

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run API tests against production
        run: npm run test:api
